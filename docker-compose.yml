version: "3.9"

services:
  # ─────────────────────────────────────────
  # PostgreSQL with pgvector extension
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: gaeo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gaeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gaeo_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gaeo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gaeo} -d ${POSTGRES_DB:-gaeo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — cache & pub/sub
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gaeo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: gaeo_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─────────────────────────────────────────
  # Next.js — full-stack app (frontend + API)
  # ─────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: gaeo_web
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gaeo}:${POSTGRES_PASSWORD:-gaeo_pass}@postgres:5432/${POSTGRES_DB:-gaeo_db}
      REDIS_URL: redis://redis:6379/0
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Nginx — reverse proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gaeo_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: gaeo_network
